<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayan Gallery</title>

<style>
body{
    margin:0;
    background:black;
    font-family:Arial;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    scroll-snap-align:start;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}
</style>
</head>
<body>

<div class="section">
    <video controls muted loop>
        <source src="vid.mp4" type="video/mp4">
    </video>
</div>

<div class="section">
    <video controls muted loop>
        <source src="vid2.mp4" type="video/mp4">
    </video>
</div>

<div class="section">
    <video controls muted loop>
        <source src="vid3.mp4" type="video/mp4">
    </video>
</div>

<div class="section">
    <video controls muted loop>
        <source src="vid4.mp4" type="video/mp4">
    </video>
</div>

<div class="section">
    <video controls muted loop>
        <source src="vid5.mp4" type="video/mp4">
    </video>
</div>

<div class="section">
    <video controls muted loop>
        <source src="vid6.mp4" type="video/mp4">
    </video>
</div>

<div class="section">
    <video controls muted loop>
        <source src="vid7.mp4" type="video/mp4">
    </video>
</div>

<script>
const videos = document.querySelectorAll("video");

function checkVideos(){
    videos.forEach(video => {
        const rect = video.getBoundingClientRect();

        if(rect.top >= 0 && rect.bottom <= window.innerHeight){
            videos.forEach(v => {
                if(v !== video){
                    v.pause();
                }
            });
            video.play();
        } else {
            video.pause();
        }
    });
}

window.addEventListener("scroll", checkVideos);

videos.forEach(video => {
    video.addEventListener("play", () => {
        videos.forEach(v => {
            if(v !== video){
                v.pause();
            }
        });
    });
});

checkVideos();
</script>

</body>
</html>
