<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayan Gallery Swipe</title>
<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    background:black;
    overflow:hidden;
}
.container{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}
.section{
    height:100vh;
    scroll-snap-align:start;
    position:relative;
}
video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}
.info{
    position:absolute;
    right:20px;
    bottom:100px;
    color:white;
    font-size:24px;
    display:flex;
    flex-direction:column;
    gap:15px;
}
button{
    background:none;
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}
.tap{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    background:black;
    z-index:10;
}
</style>
</head>
<body>

<div class="tap" id="tap">Tap to Start</div>
<div class="container" id="container"></div>

<script>
const container = document.getElementById("container");
let started = false;

// Dynamically create up to 100 videos
for(let i=1;i<=100;i++){
    const section = document.createElement("div");
    section.className = "section";

    const video = document.createElement("video");
    video.loop = true;
    video.id = "video"+i;
    video.src = "vid"+i+".mp4";

    const info = document.createElement("div");
    info.className = "info";
    info.innerHTML = `<button onclick="likeVideo(${i})">❤️ <span id="like${i}">0</span></button>
                      <div>👁️ <span id="view${i}">0</span></div>`;

    // Only append if video exists
    video.onerror = ()=> section.remove();
    section.appendChild(video);
    section.appendChild(info);
    container.appendChild(section);
}

// Initialize likes and views
function likeVideo(id){
    let likes = localStorage.getItem("like"+id) || 0;
    likes++;
    localStorage.setItem("like"+id, likes);
    document.getElementById("like"+id).textContent = likes;
}

function initCounts(){
    for(let i=1;i<=100;i++){
        if(document.getElementById("like"+i)){
            document.getElementById("like"+i).textContent = localStorage.getItem("like"+i) || 0;
            document.getElementById("view"+i).textContent = localStorage.getItem("view"+i) || 0;
        }
    }
}

// Snap scroll handler
let isScrolling;
container.addEventListener('scroll', () => {
    if(!started) return;

    window.clearTimeout(isScrolling);
    isScrolling = setTimeout(() => {
        const sections = document.querySelectorAll('.section');
        let closest = sections[0];
        let minDist = Math.abs(sections[0].getBoundingClientRect().top);

        sections.forEach(section=>{
            let dist = Math.abs(section.getBoundingClientRect().top);
            if(dist < minDist){
                closest = section;
                minDist = dist;
            }
        });
        closest.scrollIntoView({behavior:'smooth'});
        checkVisibleVideo();
    }, 80); // wait 80ms after scroll stop
});

// Check visible video for autoplay and views
function checkVisibleVideo(){
    if(!started) return;
    const videos = document.querySelectorAll("video");
    videos.forEach((video,index)=>{
        const rect = video.getBoundingClientRect();
        if(rect.top >= 0 && rect.top < window.innerHeight/2){
            videos.forEach(v=>{ if(v!==video) v.pause(); });
            video.play();
            if(!video.dataset.viewed){
                let views = localStorage.getItem("view"+(index+1)) || 0;
                views++;
                localStorage.setItem("view"+(index+1), views);
                document.getElementById("view"+(index+1)).textContent = views;
                video.dataset.viewed = "yes";
            }
        } else video.pause();
    });
}

document.getElementById("tap").onclick = function(){
    started = true;
    this.style.display = "none";
    initCounts();
    checkVisibleVideo();
};
</script>

</body>
</html>
