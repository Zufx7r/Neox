<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayan Gallery</title>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

.container{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
}

.section{
    height:100vh;
    width:100%;
    scroll-snap-align:start;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

.info{
    position:absolute;
    right:20px;
    bottom:80px;
    color:white;
    font-size:24px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

button{
    background:none;
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<div class="section">
    <video muted loop id="video1">
        <source src="vid.mp4" type="video/mp4">
    </video>
    <div class="info">
        <button onclick="likeVideo('1')">❤️ <span id="like1">0</span></button>
        <div>👁️ <span id="view1">0</span></div>
    </div>
</div>

<div class="section">
    <video muted loop id="video2">
        <source src="vid2.mp4" type="video/mp4">
    </video>
    <div class="info">
        <button onclick="likeVideo('2')">❤️ <span id="like2">0</span></button>
        <div>👁️ <span id="view2">0</span></div>
    </div>
</div>

</div>

<script>
const videos = document.querySelectorAll("video");

function likeVideo(id){
    let key = "like" + id;
    let count = localStorage.getItem(key) || 0;
    count++;
    localStorage.setItem(key,count);
    document.getElementById(key).textContent = count;
}

for(let i=1;i<=2;i++){
    document.getElementById("like"+i).textContent = localStorage.getItem("like"+i) || 0;
    document.getElementById("view"+i).textContent = localStorage.getItem("view"+i) || 0;
}

function checkVideos(){
    videos.forEach((video,index)=>{
        const rect = video.getBoundingClientRect();

        if(rect.top >= 0 && rect.top < window.innerHeight/2){
            videos.forEach(v=>{ if(v!==video) v.pause(); });

            video.play();

            let id = index+1;
            let key = "view"+id;

            if(!video.dataset.viewed){
                let count = localStorage.getItem(key) || 0;
                count++;
                localStorage.setItem(key,count);
                document.getElementById(key).textContent = count;
                video.dataset.viewed = "yes";
            }

        } else {
            video.pause();
        }
    });
}

document.querySelector(".container").addEventListener("scroll",checkVideos);

checkVideos();
</script>

</body>
</html>
