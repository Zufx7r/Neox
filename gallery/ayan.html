<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayan Gallery Neon</title>
<style>
html,body{margin:0;padding:0;height:100%;background:black;overflow:hidden;}
.container{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;}
.section{height:100vh;scroll-snap-align:start;position:relative;}
video{width:100%;height:100%;object-fit:contain;background:black;}
.info{position:absolute;right:20px;bottom:100px;color:white;font-size:24px;display:flex;flex-direction:column;gap:15px;}
button{background:none;border:none;color:white;font-size:24px;cursor:pointer;}
.tap{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;color:white;font-size:28px;background:black;z-index:10;}
</style>
</head>
<body>

<div class="tap" id="tap">Tap to Start</div>
<div class="container" id="container"></div>

<script>
const API_URL = "/.netlify/functions/video";
const container = document.getElementById("container");
let started = false;

let viewedVideos = JSON.parse(sessionStorage.getItem("viewedVideos") || "[]");
let likedVideos = JSON.parse(sessionStorage.getItem("likedVideos") || "[]");

// Create 100 video sections
for(let i=1;i<=100;i++){
    const section = document.createElement("div");
    section.className = "section";

    const video = document.createElement("video");
    video.loop = true;
    video.id = "video"+i;
    video.src = "vid"+i+".mp4";

    const info = document.createElement("div");
    info.className = "info";
    info.innerHTML = `<button onclick="toggleLike(${i})">❤️ <span id="like${i}">0</span></button>
                      <div>👁️ <span id="view${i}">0</span></div>`;

    video.onerror = ()=> section.remove(); // remove if file doesn't exist
    section.appendChild(video);
    section.appendChild(info);
    container.appendChild(section);
}

// Like toggle
function toggleLike(id){
    const liked = likedVideos.includes(id);
    const likeSpan = document.getElementById("like"+id);

    if(liked){
        likeSpan.textContent = parseInt(likeSpan.textContent)-1;
        likedVideos = likedVideos.filter(v=>v!==id);
    } else {
        likeSpan.textContent = parseInt(likeSpan.textContent)+1;
        likedVideos.push(id);
    }
    sessionStorage.setItem("likedVideos", JSON.stringify(likedVideos));

    fetch(API_URL, {
        method:"POST",
        body: JSON.stringify({videoId:id, action: liked ? "dislike":"like"})
    });
}

// View count
function handleVideoView(id){
    if(!viewedVideos.includes(id)){
        viewedVideos.push(id);
        sessionStorage.setItem("viewedVideos", JSON.stringify(viewedVideos));

        const viewSpan = document.getElementById("view"+id);
        viewSpan.textContent = parseInt(viewSpan.textContent)+1;

        fetch(API_URL,{
            method:"POST",
            body: JSON.stringify({videoId:id, action:"view"})
        });
    }
}

// Init counts
async function initCounts(){
    for(let i=1;i<=100;i++){
        const res = await fetch(API_URL, {
            method:"POST",
            body: JSON.stringify({videoId:i, action:"get"})
        });
        const data = await res.json();
        if(document.getElementById("like"+i)) document.getElementById("like"+i).textContent = data.likes;
        if(document.getElementById("view"+i)) document.getElementById("view"+i).textContent = data.views;
    }
}

// IntersectionObserver for fast, smooth video detection
function initObserver(){
    const videos = document.querySelectorAll("video");
    const observer = new IntersectionObserver((entries)=>{
        entries.forEach(entry=>{
            const video = entry.target;
            const id = parseInt(video.id.replace("video",""));
            if(entry.isIntersecting){
                video.play();
                handleVideoView(id);
                videos.forEach(v=>{if(v!==video)v.pause();});
            } else video.pause();
        });
    },{threshold:0.7});
    videos.forEach(v=>observer.observe(v));
}

// Tap to start
document.getElementById("tap").onclick = function(){
    started = true;
    this.style.display = "none";
    initCounts();
    initObserver();
};
</script>

</body>
</html>
