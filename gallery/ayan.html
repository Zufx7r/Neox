<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayan Gallery</title>

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    background:black;
    overflow:hidden;
}

.container{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.section{
    height:100vh;
    scroll-snap-align:start;
    position:relative;
}

video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

.info{
    position:absolute;
    right:20px;
    bottom:100px;
    color:white;
    font-size:24px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

button{
    background:none;
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}

.tap{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    background:black;
    z-index:10;
}
</style>
</head>
<body>

<div class="tap" id="tap">Tap to Start</div>

<div class="container">

<div class="section">
    <video loop id="video1">
        <source src="vid.mp4" type="video/mp4">
    </video>
    <div class="info">
        <button onclick="likeVideo(1)">❤️ <span id="like1">0</span></button>
        <div>👁️ <span id="view1">0</span></div>
    </div>
</div>

<div class="section">
    <video loop id="video2">
        <source src="vid2.mp4" type="video/mp4">
    </video>
    <div class="info">
        <button onclick="likeVideo(2)">❤️ <span id="like2">0</span></button>
        <div>👁️ <span id="view2">0</span></div>
    </div>
</div>

</div>

<script>
const videos = document.querySelectorAll("video");
let started = false;

function likeVideo(id){
    let likes = localStorage.getItem("like"+id) || 0;
    likes++;
    localStorage.setItem("like"+id, likes);
    document.getElementById("like"+id).textContent = likes;
}

for(let i=1;i<=2;i++){
    document.getElementById("like"+i).textContent = localStorage.getItem("like"+i) || 0;
    document.getElementById("view"+i).textContent = localStorage.getItem("view"+i) || 0;
}

function checkVisibleVideo(){
    if(!started) return;

    videos.forEach((video,index)=>{
        const rect = video.getBoundingClientRect();

        if(rect.top >= 0 && rect.top < window.innerHeight/2){
            videos.forEach(v=>{
                if(v !== video) v.pause();
            });

            video.play();

            if(!video.dataset.viewed){
                let views = localStorage.getItem("view"+(index+1)) || 0;
                views++;
                localStorage.setItem("view"+(index+1), views);
                document.getElementById("view"+(index+1)).textContent = views;
                video.dataset.viewed = "yes";
            }
        } else {
            video.pause();
        }
    });
}

document.querySelector(".container").addEventListener("scroll", checkVisibleVideo);

document.getElementById("tap").onclick = function(){
    started = true;
    this.style.display = "none";
    checkVisibleVideo();
};
</script>

</body>
</html>
