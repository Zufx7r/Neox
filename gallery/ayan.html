<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayan Gallery Neon</title>
<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
    background:black;
    overflow:hidden;
}
.container{
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}
.section{
    height:100vh;
    scroll-snap-align:start;
    position:relative;
}
video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}
.info{
    position:absolute;
    right:20px;
    bottom:100px;
    color:white;
    font-size:24px;
    display:flex;
    flex-direction:column;
    gap:15px;
}
button{
    background:none;
    border:none;
    color:white;
    font-size:24px;
    cursor:pointer;
}
.tap{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:28px;
    background:black;
    z-index:10;
}
</style>
</head>
<body>

<div class="tap" id="tap">Tap to Start</div>
<div class="container" id="container"></div>

<script>
// Config: API endpoint for Neon serverless function
const API_URL = "/.netlify/functions/video";

const container = document.getElementById("container");
let started = false;

// Track viewed and liked videos per session
let viewedVideos = JSON.parse(sessionStorage.getItem("viewedVideos") || "[]");
let likedVideos = JSON.parse(sessionStorage.getItem("likedVideos") || "[]");

// Create 100 video sections dynamically
for(let i=1;i<=100;i++){
    const section = document.createElement("div");
    section.className = "section";

    const video = document.createElement("video");
    video.loop = true;
    video.id = "video"+i;
    video.src = "vid"+i+".mp4";

    const info = document.createElement("div");
    info.className = "info";
    info.innerHTML = `<button onclick="likeVideo(${i})">❤️ <span id="like${i}">0</span></button>
                      <div>👁️ <span id="view${i}">0</span></div>`;

    video.onerror = ()=> section.remove(); // remove if file doesn't exist

    section.appendChild(video);
    section.appendChild(info);
    container.appendChild(section);
}

// Like/dislike toggle
async function likeVideo(id){
    const action = likedVideos.includes(id) ? "dislike" : "like"; 
    const res = await fetch(API_URL, {
        method:"POST",
        body: JSON.stringify({videoId:id, action})
    });
    const data = await res.json();
    document.getElementById("like"+id).textContent = data.likes;

    if(action==="like"){
        likedVideos.push(id);
    } else {
        likedVideos = likedVideos.filter(v=>v!==id);
    }
    sessionStorage.setItem("likedVideos", JSON.stringify(likedVideos));
}

// Add view (once per session)
async function addView(id){
    const res = await fetch(API_URL, {
        method:"POST",
        body: JSON.stringify({videoId:id, action:"view"})
    });
    const data = await res.json();
    document.getElementById("view"+id).textContent = data.views;
}

// Initialize counts when page starts
async function initCounts(){
    for(let i=1;i<=100;i++){
        const res = await fetch(API_URL, {
            method:"POST",
            body: JSON.stringify({videoId:i, action:"get"})
        });
        const data = await res.json();
        if(document.getElementById("like"+i)) document.getElementById("like"+i).textContent = data.likes;
        if(document.getElementById("view"+i)) document.getElementById("view"+i).textContent = data.views;
    }
}

// Snap scroll one video per swipe
let isScrolling;
container.addEventListener('scroll', () => {
    if(!started) return;

    window.clearTimeout(isScrolling);
    isScrolling = setTimeout(() => {
        const sections = document.querySelectorAll('.section');
        let closest = sections[0];
        let minDist = Math.abs(sections[0].getBoundingClientRect().top);

        sections.forEach(section=>{
            let dist = Math.abs(section.getBoundingClientRect().top);
            if(dist < minDist){
                closest = section;
                minDist = dist;
            }
        });
        closest.scrollIntoView({behavior:'smooth'});
        checkVisibleVideo();
    }, 80);
});

// Check which video is visible for autoplay and views
function checkVisibleVideo(){
    if(!started) return;
    const videos = document.querySelectorAll("video");
    videos.forEach((video,index)=>{
        const rect = video.getBoundingClientRect();
        if(rect.bottom > 0 && rect.top < window.innerHeight){
            videos.forEach(v=>{ if(v!==video) v.pause(); });
            video.play();
            const vidNum = index+1;
            if(!viewedVideos.includes(vidNum)){
                addView(vidNum);
                viewedVideos.push(vidNum);
                sessionStorage.setItem("viewedVideos", JSON.stringify(viewedVideos));
            }
        } else video.pause();
    });
}

// Start tap
document.getElementById("tap").onclick = function(){
    started = true;
    this.style.display = "none";
    initCounts();
    checkVisibleVideo();
};
</script>

</body>
</html>
